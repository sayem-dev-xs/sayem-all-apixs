<!DOCTYPE html>
<html>
<head>
<title>REST API Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}
header {
  text-align:center;
  padding:20px;
  font-size:24px;
}
.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:20px;
}
.card {
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:10px;
}
button {
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.output {
  margin:20px;
  padding:15px;
  background:black;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🚀 REST API Dashboard</header>

<div class="container" id="apis"></div>
<div class="output" id="output">Click API...</div>

<script>
const apiBox = document.getElementById("apis");
const output = document.getElementById("output");

async function loadApis() {
  const res = await fetch("/api-list");
  const data = await res.json();

  data.apis.forEach(api => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>/api/${api.name}</h3>
      <p>${api.description}</p>
      <button onclick="run('${api.name}')">Run</button>
    `;

    apiBox.appendChild(div);
  });
}

async function run(name) {
  output.innerText = "Loading...";
  const res = await fetch(`/api/${name}`);
  const data = await res.json();
  output.innerText = JSON.stringify(data, null, 2);
}

loadApis();
</script>

</body>
</html>
